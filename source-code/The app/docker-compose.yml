services:
  backend:
    image: aymannnnnh/lss_assistant-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
    depends_on:
      - ollama

  frontend:
    image: aymannnnnh/lss_assistant-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    ports:
      - "8080:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
